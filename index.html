<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libella - Agricoltura di Precisione</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap');
    body { 
      margin: 0; 
      padding: 0; 
      font-family: 'Inter', sans-serif; 
      background-color: #020203;
      transition: opacity 0.4s ease-in-out;
    }
    .bg-agri {
      background-image: linear-gradient(rgba(2, 2, 3, 0.45), rgba(2, 2, 3, 0.65)), 
                        url('images/sfondo.jpg');
      background-size: cover; 
      background-position: center; 
      background-attachment: fixed; 
      min-height: 100vh;
    }
    #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; pointer-events: auto; }
    .content { position: relative; z-index: 2; }

    /* Animazioni generali */
    main, section.content {
      animation: fadeInUp 0.8s ease-out forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Menu Mobile Premium */
    #mobile-menu {
      transition: all 0.6s cubic-bezier(0.32, 0.72, 0, 1);
      transform: translateX(100%);
      opacity: 0;
      visibility: hidden;
    }

    #mobile-menu.active {
      transform: translateX(0);
      opacity: 1;
      visibility: visible;
    }

    .menu-link {
      transition: all 0.3s ease;
    }
    .menu-link:hover {
      transform: translateX(12px);
      color: #10b981;
    }
  </style>
</head>
<body class="bg-agri text-white">

  <div id="particles-js"></div>

  <nav class="fixed top-0 w-full z-50 border-b border-white/5 bg-[#020203]/40 backdrop-blur-md">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <span class="font-bold tracking-[0.2em] text-sm text-emerald-400">LIBELLA</span>
      
      <div class="hidden md:flex gap-8 text-xs uppercase tracking-widest">
        <a href="index.html" class="text-emerald-400 border-b border-emerald-400 pb-1">Home</a>
        <a href="chi-siamo.html" class="hover:text-emerald-400 transition">Chi Siamo</a>
        <a href="servizi.html" class="hover:text-emerald-400 transition">Servizi</a>
        <a href="tecnologia.html" class="hover:text-emerald-400 transition">Tecnologia</a>
        <a href="galleria.html" class="hover:text-emerald-400 transition">Galleria</a>
        <a href="contatti.html" class="hover:text-emerald-400 transition">Contatti</a>
      </div>

      <button id="menu-btn" class="md:hidden text-3xl text-white/90 hover:text-emerald-400 transition-colors z-[60]">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>
  </nav>

  <!-- MENU MOBILE PREMIUM -->
  <div id="mobile-menu" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-[55] flex flex-col">
    <div class="flex justify-end p-6">
      <button id="close-menu" class="text-4xl text-white/70 hover:text-white transition-colors">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    
    <div class="flex-1 flex flex-col justify-center items-center gap-10 text-3xl font-light tracking-widest">
      <a href="index.html" class="menu-link text-emerald-400">Home</a>
      <a href="chi-siamo.html" class="menu-link hover:text-emerald-400 transition">Chi Siamo</a>
      <a href="servizi.html" class="menu-link hover:text-emerald-400 transition">Servizi</a>
      <a href="tecnologia.html" class="menu-link hover:text-emerald-400 transition">Tecnologia</a>
      <a href="galleria.html" class="menu-link hover:text-emerald-400 transition">Galleria</a>
      <a href="contatti.html" class="menu-link hover:text-emerald-400 transition">Contatti</a>
    </div>

    <div class="text-center pb-12 text-white/40 text-sm">
      © 2026 Libella-Agri
    </div>
  </div>

  <!-- HERO -->
  <section class="relative min-h-screen flex items-center justify-center overflow-hidden content">
    <div class="absolute inset-0 bg-gradient-to-b from-black/30 via-black/40 to-black/70"></div>
    
    <div class="relative z-10 text-center px-6">
      <img src="images/Libella-3.svg" alt="Libella" class="mx-auto mb-12 w-[480px] md:w-[650px] max-w-[90vw] drop-shadow-[0_10px_35px_rgba(16,185,129,0.15)]">
      
      <div class="flex flex-col sm:flex-row gap-6 justify-center">
        <a href="servizi.html" class="bg-emerald-600 hover:bg-emerald-500 px-10 py-4 rounded-2xl font-semibold text-lg transition">Scopri i Servizi</a>
        <a href="contatti.html" class="border-2 border-white/60 hover:border-white hover:bg-white hover:text-black px-10 py-4 rounded-2xl font-semibold text-lg transition">Contattaci</a>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="content bg-black/40 border-t border-white/5 py-8 text-center text-white/40 text-sm">
    <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
      <p>&copy; 2026 Libella-Agri. Tutti i diritti riservati.</p>
      <div class="flex gap-6">
        <a href="contatti.html#privacy" class="hover:text-emerald-400 transition">Privacy Policy</a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      "particles": { "number": { "value": 80 }, "color": { "value": "#10b981" }, "opacity": { "value": 0.5 }, "size": { "value": 3 }, "line_linked": { "enable": true, "distance": 150, "color": "#10b981", "opacity": 0.4 }, "move": { "enable": true, "speed": 1 } },
      "interactivity": { "detect_on": "window", "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } } }
    });

    // Menu Mobile Premium
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    const closeBtn = document.getElementById('close-menu');

    function openMenu() {
      mobileMenu.classList.remove('hidden');
      setTimeout(() => mobileMenu.classList.add('active'), 10);
      document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
      mobileMenu.classList.remove('active');
      setTimeout(() => {
        mobileMenu.classList.add('hidden');
        document.body.style.overflow = '';
      }, 600);
    }

    menuBtn.addEventListener('click', openMenu);
    closeBtn.addEventListener('click', closeMenu);

    mobileMenu.addEventListener('click', (e) => {
      if (e.target === mobileMenu) closeMenu();
    });

    // Fade tra pagine
    window.addEventListener('beforeunload', () => {
      document.body.style.opacity = '0';
    });
  </script>
</body>
</html>
