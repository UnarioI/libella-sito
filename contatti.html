</head>
<body class="bg-zinc-950 text-white">

  <!-- NAV -->
  <nav class="fixed top-0 w-full bg-black/90 backdrop-blur-lg z-50 border-b border-white/10">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-center gap-10 text-lg">
      <a href="index.html" class="hover:text-emerald-400 transition">Home</a>
      <a href="chi-siamo.html" class="hover:text-emerald-400 transition">Chi Siamo</a>

      <a href="contatti.html" class="text-emerald-400 font-semibold">Contatti</a>

  <section class="pt-32 pb-24">
    <div class="max-w-4xl mx-auto px-6">
      <h1 class="heading text-5xl font-bold text-center mb-12">Contatti</h1>
      
      <div class="grid md:grid-cols-2 gap-16">
        <div>
          <h3 class="text-2xl font-semibold mb-6">Scrivici</h3>
          
          <!-- MODULO DI CONTATTO COLLEGATO A FORMSPREE -->
          <form action="https://formspree.io/f/maqrnbyn" method="POST" class="space-y-6">
            
            <input type="text" name="Nome" placeholder="Nome" required 
                   class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500 transition">
            
            <input type="email" name="Email" placeholder="Email" required 
                   class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500 transition">
            
            <input type="tel" name="Telefono" placeholder="Telefono" 
                   class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500 transition">
            
            <textarea name="Messaggio" placeholder="Messaggio" rows="6" required 
                      class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-emerald-500 transition"></textarea>
            
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-semibold text-lg transition">
              Invia Messaggio
            </button>
          </form>
        </div>

        <div>
          <h3 class="text-2xl font-semibold mb-6">I Nostri Contatti</h3>
          <div class="space-y-8 text-white/70">
            <div>
              <p class="font-semibold text-white">Email</p>
              <p>info@libella-agri.it</p>
            </div>
            <div>
              <p class="font-semibold text-white">Samuel De Filippo</p>
              <p>+39 331 760 9407</p>
              <p class="text-sm">Sant'Elpidio a Mare (FM) - Marche</p>
            </div>
            <div>
              <p class="font-semibold text-white">Marco Breglia</p>
              <p>+39 366 689 8916</p>
              <p class="text-sm">Cagli (PU) - Marche</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
